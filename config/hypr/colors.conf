# Auto generated color theme for image at: [Local wallpaper]
general {
    col.active_border = rgba(3e476bFF)
    col.inactive_border = rgba(0a3535CC)
}

plugin {
    droidbars {
        # example config
        bar_height = 30
        background_color = rgba(122620FF)
        # background_color_active = rgba(027488FF) # Not added yet
        text_color = rgba(acd7d0FF)
        font_family = Lexend
        button_font_fmily = JetBrainsMono NF

        # example buttons (R -> L)
        # droidbars-button = [0]isLeft(0/1), [1]color, [2]color2, [3]width, [4]height, [5]icon, [6]buttonType, [7]on-click     
        droidbars-button = 0, rgba(acd7d0FF), rgba(a4cdbfFF), 42, 16,‎    󰖭, normal, hyprctl dispatch killactive
        droidbars-button = 0, rgba(acd7d0FF), rgba(a4cdbfFF), 42, 16,‎   , normal, hyprctl dispatch fullscreen 1
        droidbars-button = 1, rgba(acd7d0FF), rgba(a4cdbfFF), 16, 16,‎󰐃, pin, hyprctl dispatch pin
        droidbars-button = 1, rgba(acd7d0FF), rgba(a4cdbfFF), 16, 16,󰗘, float, hyprctl dispatch togglefloating
    }
}
