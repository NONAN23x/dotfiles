# Auto generated color theme for image at: [Local wallpaper]
general {
    col.active_border = rgba(7d7327FF)
    col.inactive_border = rgba(51504bAA)
}

plugin {
    droidbars {
        # example config
        bar_height = 30
        background_color = rgba(f9f8f5FF)
        # background_color_active = rgba(6F8C59FF) # Not added yet
        text_color = rgba(b2b2b2FF)
        font_family = Lexend
        button_font_fmily = JetBrainsMono NF

        # example buttons (R -> L)
        # droidbars-button = [0]isLeft(0/1), [1]color, [2]color2, [3]width, [4]height, [5]icon, [6]buttonType, [7]on-click     
        droidbars-button = 0, rgba(b2b2b2FF), rgba(e1d796FF), 42, 16,‎    󰖭, normal, hyprctl dispatch killactive
        droidbars-button = 0, rgba(b2b2b2FF), rgba(e1d796FF), 42, 16,‎   , normal, hyprctl dispatch fullscreen 1
        droidbars-button = 1, rgba(b2b2b2FF), rgba(e1d796FF), 16, 16,‎󰐃, pin, hyprctl dispatch pin
        droidbars-button = 1, rgba(b2b2b2FF), rgba(e1d796FF), 16, 16,󰗘, float, hyprctl dispatch togglefloating
    }
}
