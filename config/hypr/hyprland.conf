# Window Rules
windowrule = float,^(blueman-manager)$
windowrule = float,^(pavucontrol)$
windowrule = float,^(spotify)$
windowrule = float,^(nm-connection-editor)$
windowrule = float,^(eog)$
windowrule = float,^(org.gnome.Calculator)$
windowrule = float,^(org.gnome.Nautilus)$
windowrule = float,^(org.gnome.clocks)$
windowrule = float,^(VirtualBox Manager)$

# I dont know whether these are supposed to help or not
windowrule=float,title:^(Open File)(.*)$
windowrule=float,title:^(Select a File)(.*)$
windowrule=float,title:^(Choose wallpaper)(.*)$
windowrule=float,title:^(Open Folder)(.*)$
windowrule=float,title:^(Save As)(.*)$
windowrule=float,title:^(Library)(.*)$
windowrule=float,title:^(Home)(.*)$

# Opacity Rules
windowrule = opacity 0.90 override 0.90 override, .*
# windowrulev2 = opacity 0.8 0.8,class:^(discord|kitty|Code)$
windowrulev2 = center,class:^(org.gnome.*)$


# layerrules for better blurs
layerrule = blur, gtk-layer-shell
layerrule = ignorealpha 0.4, gtk-layer-shell

