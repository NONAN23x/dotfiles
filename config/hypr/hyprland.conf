### 
### Hyprland Configuration
###


# Screen Configuration
monitor=,preferred,auto,1

# Binds Configuration
source = ~/.config/hypr/binds.conf

# Startup Applications
source = ~/.config/hypr/execs.conf

# Border Colors
source = ~/.config/hypr/colors.conf

# Environment Variables
source = ~/.config/hypr/env.conf

# Keyboard
input {
    force_no_accel = false
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        scroll_factor = 0.5
    }
    scroll_method = 2fg
}


# General
general {
    max_fps = 75
    gaps_in = 4
    gaps_out = 6
    border_size = 2
    layout = dwindle
    allow_tearing = false

}


# Misc
misc {
    disable_hyprland_logo = no
    vfr = true;
    vrr = 1;
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    focus_on_activate = true
    enable_swallow = true
}


# Decoration
decoration {
    rounding = 20
    drop_shadow = true
    shadow_range = 15
    shadow_ignore_window = true
    shadow_offset = 0 2
    shadow_render_power = 6
    col.shadow = rgba(00000044)
    col.shadow_inactive=0x33000000

    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0

    blur {
     enabled = true
     xray = true
     size = 5
     passes = 4
     new_optimizations = on
     ignore_opacity = true
     brightness = 1.1
     noise = 0.01
     contrast = 1
    }
}


# Animations
animations {
    enabled = yes
    bezier = quart, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.6, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = borderCurve,  0.51, 0.54, 0.38, 0.41 
    
    animation = windows, 1, 6, crazyshot, slide
    # animation = borderangle, 1, 40, borderCurve, loop
    animation = workspaces, 1, 6, fluent_decel, slide
    animation = fade, 1, 6, quart
}


# Dwindle Layout Tweaks
dwindle {
    pseudotile = yes 
    preserve_split = true
}


# Master Layout Tweaks
master {
    new_is_master = true
}


# Touchpad Gestures
gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = true
    workspace_swipe_distance = 700
    workspace_swipe_fingers = 4
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5

    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 0
    
    workspace_swipe_create_new = true
    
}

device:epic mouse V1 {
    sensitivity = -0.5
}


