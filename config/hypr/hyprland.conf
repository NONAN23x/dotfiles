# Hyprland Configuration


# Screen Configuration
monitor=,3200x2000@90,auto,auto


# Binds Configuration
source = ~/.config/hypr/binds.conf


# Startup Applications
source = ~/.config/hypr/execs.conf


# Keyboard
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}


general {
    gaps_in = 6
    gaps_out = 16
    border_size = 3
    col.active_border = rgb(EABC00) 
    col.inactive_border = rgb(1e1d40)
    layout = dwindle
}


misc {
    disable_hyprland_logo = no
    vfr = true;
    vrr = 0;
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    focus_on_activate = true
}


decoration {
    rounding = 12
    blurls = lockscreen
    drop_shadow = yes
    shadow_range = 150
    shadow_render_power = 5
    col.shadow = 0x33000000
    col.shadow_inactive=0x22000000
    blur {
     enabled = no
     size = 6
     passes = 4
     new_optimizations = on
     ignore_opacity = true

    }
}


animations {
    enabled = yes
    bezier = myBezier,0.05,0.9,0.1,1.0
    bezier = newBezier, 0.68, -0.6, 0.34, 1.4
    bezier = secondBezier, 0.0, -1, 0.1, 2.0
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 8, myBezier, popin
    animation = windowsOut, 1, 10, overshot, slide
    animation = workspaces, 1, 8, newBezier, slidevert
}


dwindle {
    pseudotile = yes 
    preserve_split = yes # you probably want this
}


master {
    new_is_master = true
}


gestures {
    workspace_swipe = on
    workspace_swipe_fingers = 3;
    workspace_swipe_min_speed_to_force = 30;
}


device:epic mouse V1 {
    sensitivity = -0.5
}


xwayland {
  env = GDK_SCALE,2
  force_zero_scaling = true

}


windowrule = float,^(blueman-manager)$
windowrule = float,^(pavucontrol)$
windowrule = float,^(mpv)$
windowrule = float,^(spotify)$
windowrule = float,^(nm-connection-editor)$
windowrule = float,^(thunar)$
windowrule = float,^(discord)$
windowrule = float,^(virtualbox)$

# windowrulev2 = opacity 0.8 0.8,class:^(wofi|thunar|discord|Code|Spotify)$
# windowrulev2 = opacity 0.8 0.8, class:^(kitty)$
windowrulev2 = animation popin,class:^(kitty)$,title:^(update-sys)$
windowrulev2 = animation popin,class:^(thunar)$
# windowrulev2 = opacity 0.8 0.8,class:^(thunar)$
windowrulev2 = animation slide ,class:^(rofi)$
windowrulev2 = move 100%-433 53,class:^(rofi)$,title:^(clippick)$
windowrulev2 = move 100%-433 53,class:^(discord)$


