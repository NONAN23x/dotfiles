# Hyprland Configuration File


# MONITOR CONFIG
monitor=,preferred,auto,2


# Environment Variables
source=~/.config/hypr/env.conf


# Startup executions
source=~/.config/hypr/execs.conf


# Window and layer rules
layerrule = noanim, selection
source=~/.config/hypr/rules.conf


# Dynamic colors
source=~/.config/hypr/colors.conf


# dynamic blur
source=~/.config/hypr/blur.conf


# Keybinds
source=~/.config/hypr/keybinds.conf
windowrulev2=rounding 20, onworkspace:1


# For HiDPI Screens Only
xwayland {
  env = GDK_SCALE,2
  force_zero_scaling = true
  env = QT_AUTO_SCREEN_SCALE_FACTOR, 2
  env = QT_ENABLE_HIGHDPI_SCALING, 2
}


input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
    
    special_fallthrough = true
    follow_mouse = 1
}


binds {
    # focus_window_on_workspace_c# For Auto-run stuff see execs.confhange = true
    scroll_event_delay = 0
}


gestures {
    workspace_swipe = true
    workspace_swipe_distance = 500
    workspace_swipe_fingers = 3
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}


general {
    # Gaps and border
    gaps_in = 6
    gaps_out = 10
    gaps_workspaces = 50
    border_size = 1
    
    # Fallback colors
    col.active_border = rgba(000000FF)
    col.inactive_border = rgba(31313600)

    resize_on_border = true
    no_focus_fallback = true
    layout = dwindle
}


dwindle {
	preserve_split = true
	smart_split = false
	smart_resizing = false
}


decoration {
    rounding = 20
    blur {
        xray = true
        new_optimizations = on
        ignore_opacity = true
        size = 8
        passes = 2
        brightness = 1
        noise = 0.01
        contrast = 1
    }
    drop_shadow = yes
    shadow_ignore_window = true
    shadow_range = 20
    shadow_offset = 0 2
    shadow_render_power = 2
    col.shadow = rgba(0000001A)
}


animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    # animation = workspaces, 1, 3.5, md3_decel, slide
    animation = workspaces, 1, 7, fluent_decel, slide
    # animation = workspaces, 1, 7, fluent_decel, slidefade 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}


misc {
    vfr = 1
    vrr = 1
    focus_on_activate = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    
    disable_hyprland_logo = false
    force_default_wallpaper = 0
    new_window_takes_over_fullscreen = 2
}


