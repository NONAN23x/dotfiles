# vim:ft=kitty

# ==============================================================================
# Fonts
# ==============================================================================
font_size 14.0
font_family      family="Agave Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto

# ==============================================================================
# Window & Layout
# ==============================================================================
window_padding_width 12
# Allow multiple layouts (switch with ctrl+shift+l)
enabled_layouts splits, stack, fat, tall, grid

# ==============================================================================
# Tab Bar
# ==============================================================================
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         round
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# ==============================================================================
# Cursor & Mouse
# ==============================================================================
# Smooth cursor trail animation
cursor_trail 3

# ==============================================================================
# Colors - Catppuccin Mocha (Hardcoded)
# ==============================================================================
# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# URL color when hovering with mouse
url_color               #f5e0dc

# Kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# The 16 terminal colors
# black
color0 #45475a
color8 #585b70
# red
color1 #f38ba8
color9 #f38ba8
# green
color2  #a6e3a1
color10 #a6e3a1
# yellow
color3  #f9e2af
color11 #f9e2af
# blue
color4  #89b4fa
color12 #89b4fa
# magenta
color5  #f5c2e7
color13 #f5c2e7
# cyan
color6  #94e2d5
color14 #94e2d5
# white
color7  #bac2de
color15 #a6adc8

# ==============================================================================
# Advanced / Nice-to-haves
# ==============================================================================
# Allow remote control for dynamic scripting and external control
allow_remote_control yes
listen_on unix:@mykitty

# Dynamic background opacity
dynamic_background_opacity yes
background_opacity 1.0

# Keybindings for opacity: Ctrl+Shift+a followed by m (more) or l (less)
map ctrl+shift+a>m set_background_opacity +0.1
map ctrl+shift+a>l set_background_opacity -0.1

# Quick URL picking via keyboard (hints kitten)
map ctrl+shift+e kitten hints
