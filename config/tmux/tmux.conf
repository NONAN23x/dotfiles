# ==============================================================================
# Core Settings
# ==============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-overrides ',xterm-kitty:ke' # Fix for certain TUIs
set -g mouse on
set -g set-clipboard on

# Navigation & UI Performance
set -sg escape-time 10         # Faster escape sequences (fixed TUI lag)
set -g focus-events on         # Let TUIs know when they have focus
set -g history-limit 100000    # Much bigger scrollback buffer
set -g status-interval 5       # Update status bar more often

# Image passthrough for tools like yazi and kitty icat
set -gq allow-passthrough on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==============================================================================
# Keybindings
# ==============================================================================
# Prefix Key
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Split bindings
bind 'o' split-window -v -c "#{pane_current_path}"
bind 'p' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Floating scratchpad (Toggle with Alt+g)
bind -n M-g display-popup -E "tmux new-session -A -s scratch"

# Copy mode (vi keys)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
set -g @yank_selection 'primary'

# ==============================================================================
# Theme & UI (Catppuccin Mocha)
# ==============================================================================
set -g status-position bottom
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_date_time_text " %d/%b %I:%M"

# Run catppuccin plugin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Ensure the status background stays transparent (blends with terminal)
set -g status-bg default
set -g status-style bg=default

# Status Bar Modules Setup
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_weather}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right " "

# ==============================================================================
# Plugins (TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Plugin Configuration
set -g @continuum-restore 'off' # Auto-restore tmux sessions on start

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
