# ==============================================================================
# Core Settings
# ==============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,alacritty:RGB,foot:RGB,wezterm:RGB"
set -as terminal-overrides ',xterm-kitty:ke' # Fix for certain TUIs
set -g mouse on
set -g set-clipboard on

# Navigation & UI Performance
set -sg escape-time 10         # Faster escape sequences (fixed TUI lag)
set -g focus-events on         # Let TUIs know when they have focus
set -g extended-keys on        # Better modifier key handling in modern terminals
set -g history-limit 50000     # Large enough for logs without wasting memory
set -g status-interval 20      # Further reduce shell churn from status modules
set -g detach-on-destroy off   # Stay attached when closing the current window
set -g remain-on-exit failed   # Keep failed panes around for inspection
set -g monitor-activity on

# Image passthrough for tools like yazi and kitty icat
set -gq allow-passthrough on
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==============================================================================
# Keybindings
# ==============================================================================
# Prefix Key
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Split bindings
bind 'o' split-window -v -c "#{pane_current_path}"
bind 'p' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind z resize-pane -Z
bind Tab choose-tree -Zw
bind Space last-window
bind x kill-pane
bind X kill-window
bind -r "<" swap-window -t -1
bind -r ">" swap-window -t +1
bind s set-window-option synchronize-panes \; display-message "synchronize-panes #{?pane_synchronized,on,off}"
bind b break-pane -d
bind m command-prompt -p "join pane from:" "join-pane -s '%%' -c '#{pane_current_path}'"

# Floating scratchpad
bind -n M-g display-popup -w 85% -h 80% -E "tmux new-session -A -s scratch -c '#{pane_current_path}'"

# Copy mode (vi keys)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi H send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line
set -g @yank_action 'copy-pipe-and-cancel'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
if-shell '[ -n "${WAYLAND_DISPLAY}" ] && command -v wl-copy >/dev/null 2>&1' \
  "set -s copy-command 'wl-copy'" \
  "if-shell '[ -n \"${DISPLAY}\" ] && command -v xclip >/dev/null 2>&1' 'set -s copy-command \"xclip -in -selection clipboard\"'"

# ==============================================================================
# Theme & UI (Catppuccin Mocha)
# ==============================================================================
set -g status-position bottom
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_red},#{E:@thm_mauve}}"
set -g @catppuccin_session_text " #S"
set -g @catppuccin_uptime_color "#{@thm_overlay_0}"
set -g @catppuccin_cpu_color "#{@thm_peach}"
set -g @catppuccin_battery_color "#{@thm_green}"
set -g @catppuccin_weather_color "#{@thm_overlay_0}"
set -g @catppuccin_date_time_color "#{@thm_sapphire}"
set -g @catppuccin_date_time_text " %a %d/%b %H:%M"
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_1}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"
set -g @catppuccin_pane_color "#{@thm_teal}"
set -g @catppuccin_pane_background_color "#{@thm_surface_0}"
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_default_text "##{b:pane_current_path}"

# Run catppuccin plugin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Ensure the status background stays transparent (blends with terminal)
set -g status-bg default
set -g status-style bg=default

# Status Bar Modules Setup
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_weather}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right " "

# ==============================================================================
# Plugins (TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if-shell '[ -f ~/.config/tmux/plugins/tpm/tpm ]' "run '~/.config/tmux/plugins/tpm/tpm'"
